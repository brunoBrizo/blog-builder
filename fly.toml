# Fly.io — API app (scale-to-zero). Pick primary_region near Supabase (e.g. iad, fra).
# Set secrets: fly secrets set DATABASE_URL=... DIRECT_DATABASE_URL=... (see docs/api-fly-deploy.md)

app = "blog-builder-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  interval = "15s"
  timeout = "3s"
  grace_period = "10s"
  method = "GET"
  path = "/api/health"

[deploy]
  release_command = "tsx libs/db/scripts/migrate.ts"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
